version: '3.8'

services:
  # Blackbox API Server
  blackbox-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: blackbox-api
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
      - LOG_LEVEL=info
    volumes:
      - ./workflows:/app/workflows
      - ./examples:/app/examples
      - ./logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - blackbox-network

  # Nginx Reverse Proxy (optional)
  nginx:
    image: nginx:alpine
    container_name: blackbox-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./editor:/usr/share/nginx/html/editor:ro
    depends_on:
      - blackbox-api
    restart: unless-stopped
    networks:
      - blackbox-network

  # Redis (for future caching)
  redis:
    image: redis:7-alpine
    container_name: blackbox-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    restart: unless-stopped
    networks:
      - blackbox-network

  # Prometheus (monitoring)
  prometheus:
    image: prom/prometheus:latest
    container_name: blackbox-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    restart: unless-stopped
    networks:
      - blackbox-network

  # Grafana (dashboards)
  grafana:
    image: grafana/grafana:latest
    container_name: blackbox-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./grafana/datasources:/etc/grafana/provisioning/datasources:ro
    depends_on:
      - prometheus
    restart: unless-stopped
    networks:
      - blackbox-network

networks:
  blackbox-network:
    driver: bridge

volumes:
  redis-data:
  prometheus-data:
  grafana-data:

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes

volumes:
  redis_data:

  celery_worker:
    build: .
    command: celery -A blackbox.scheduler.celery_app worker --loglevel=info
    depends_on:
      - redis

  celery_beat:
    build: .
    command: celery -A blackbox.scheduler.celery_app beat --loglevel=info
    depends_on:
      - redis

  designer:
    build: ./designer
    ports:
      - "3000:80"

  designer:
    build: ./designer
    ports:
      - "3000:80"
