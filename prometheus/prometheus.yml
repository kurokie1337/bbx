global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'blackbox-cluster'
    environment: 'production'

scrape_configs:
  # Blackbox API metrics
  - job_name: 'blackbox-api'
    static_configs:
      - targets: ['blackbox-api:8000']
    metrics_path: '/metrics'
    
  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
  
  # Redis metrics
  - job_name: 'redis'
    static_configs:
      - targets: ['redis:6379']
