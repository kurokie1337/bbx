# BBX Standard Library: Terraform Output
# Extract output values from Terraform state

id: terraform_output
description: Get Terraform output values
uses: docker://hashicorp/terraform:latest

cmd:
  - terraform
  - output
  - -json

inputs:
  working_dir:
    type: string
    description: "Terraform working directory"
    default: "."

output_parser:
  type: json
  description: "Parse JSON output into variables"

